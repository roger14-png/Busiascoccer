<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Busia Soccer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Kanit:ital,wght@0,300;0,400;0,600;0,700;0,800;0,900;1,600&display=swap" rel="stylesheet">
    <link rel="icon" href="/icons/icon.svg" />
    <link rel="apple-touch-icon" href="/icons/icon.svg" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <style>
      body {
        font-family: 'Inter', sans-serif;
      }
      .font-sport {
        font-family: 'Kanit', sans-serif;
      }
      
      /* Stadium Night Theme */
      .bg-stadium-theme {
        background-color: #020617; /* Slate 950 */
        /* Radial glow mimicking floodlights */
        background-image: 
          radial-gradient(circle at 50% 0%, rgba(16, 185, 129, 0.15) 0%, transparent 50%),
          radial-gradient(circle at 85% 30%, rgba(59, 130, 246, 0.1) 0%, transparent 50%),
          url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%231e293b' fill-opacity='0.15'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        min-height: 100vh;
      }
      
      /* Mesh Pattern for Sidebar/Cards */
      .bg-mesh {
        background-image: radial-gradient(rgba(255,255,255,0.1) 1px, transparent 1px);
        background-size: 8px 8px;
      }

      /* Grass Stripes for specific elements */
      .bg-grass {
        background-color: #059669;
        background-image: repeating-linear-gradient(
          90deg,
          transparent,
          transparent 20px,
          rgba(0,0,0,0.05) 20px,
          rgba(0,0,0,0.05) 40px
        );
      }
      
      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #0f172a; 
      }
      ::-webkit-scrollbar-thumb {
        background: #10b981; 
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #34d399; 
        box-shadow: 0 0 10px #10b981;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.1/",

  }
}
</script>
<link rel="stylesheet" href="/index.css">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#020617">
</head>
  <body class="bg-stadium-theme text-slate-100 selection:bg-emerald-500 selection:text-white">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js').catch((err) => console.warn('SW registration failed:', err));
      });
    }
  </script>
</body>
</html>
